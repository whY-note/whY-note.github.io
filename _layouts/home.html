<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  {% include seo.html %}

  <script src="/assets/js/theme_toggle.js"></script>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
</head>

<body>

<div id="introOverlay" class="intro-overlay" aria-hidden="true">
    <video
        id="introVideo"
        class="intro-video"
        autoplay
        muted
        playsinline
        preload="auto"
    >
        <source src="/assets/video/begin_video.mp4" type="video/mp4">
    </video>
</div>

<div id="homeRoot">

{% include header.html %}

<div class="container">
    <!-- left sidebar -->
    {% include sidebar.html %}

    <!-- content wrapper at the right -->
    <div class="content-wrapper">
        <!-- content -->
        <main class="content" id="contentMain">
            <!-- image bar -->
            <div class="image-bar">
                <div class="image-carousel" id="imageCarousel">
                    {% for image in site.data.image_bar.images %}
                        <img src="{{ image }}" alt="carousel-image">
                    {% endfor %}
                    {% for image in site.data.image_bar.images %}
                        <img src="{{ image }}" alt="carousel-image">
                    {% endfor %}
                </div>
            </div>
            <!-- main content (from md)-->
            {{content}}

            {% include footer.html %}
        </main>
    </div>
</div>

<!-- JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script src="/assets/js/main.js"></script>

<script src="/assets/js/image_bar.js"></script>

<script src="/assets/js/AOS_scroll_reveal.js"></script>

<script src="/assets/js/intro_video.js"></script>

</div>

</body>
</html>
