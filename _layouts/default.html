<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
</head>

<body>

{% include header.html %}

<div class="container">
    <!-- left sidebar -->
    {% include sidebar.html %}

    <!-- content wrapper at the right -->
    <div class="content-wrapper">
        <!-- content -->
        <main class="content" id="contentMain">
            <!-- image bar -->
            <div class="image-bar">
                <div class="image-carousel" id="imageCarousel">
                    {% for image in site.data.image_bar.images %}
                        <img src="{{ image }}" alt="carousel-image">
                    {% endfor %}
                    {% for image in site.data.image_bar.images %}
                        <img src="{{ image }}" alt="carousel-image">
                    {% endfor %}
                </div>
            </div>
            <!-- main content (from md)-->
            {{content}}
        </main>
    </div>
</div>

<!-- AOS JS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script>
  // 初始化 AOS，禁用默认的窗口滚动监听
  AOS.init({
    duration: 800,
    once: true,
    disable: 'mobile',
    startEvent: 'load'
  });

  // 轮播图片动画
  document.addEventListener('DOMContentLoaded', function() {
    const carousel = document.getElementById('imageCarousel');
    if (carousel) {
      const images = carousel.querySelectorAll('img');
      const imageCount = images.length / 2;  // 因为做了两次循环
      
      if (imageCount > 0) {
        // 计算每张图片所需的宽度
        const imageWidth = carousel.offsetWidth / imageCount;
        const speed = 0.02;  // 每帧移动像素数
        let offset = 0;
        
        function animate() {
          offset -= speed;
          // 当移动到一半时（图片重复处），重置位置
          if (Math.abs(offset) >= imageWidth * imageCount) {
            offset = 0;
          }
          carousel.style.transform = `translateX(${offset}px)`;
          requestAnimationFrame(animate);
        }
        
        animate();
      }
    }

    // 手动监听 .content 容器的滚动事件
    const contentEl = document.querySelector('.content');
    if (contentEl) {
      // 监听滚动并手动触发 AOS 检测
      contentEl.addEventListener('scroll', function() {
        document.querySelectorAll('[data-aos]').forEach(function(el) {
          const rect = el.getBoundingClientRect();
          const contentRect = contentEl.getBoundingClientRect();
          
          // 检查元素是否在 content 容器的可视区域内
          if (rect.top < contentRect.bottom && rect.bottom > contentRect.top) {
            el.classList.add('aos-animate');
          }
        });
      });
      
      // 初始触发一次，显示首屏内容
      contentEl.dispatchEvent(new Event('scroll'));
    }
  });
</script>

{% include footer.html %}


</body>
</html>
