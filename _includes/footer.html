{% assign profile = site.data.profile %}

<footer class="footer">
    <div class="footer-inner">
        <p class="footer-title" data-i18n="footer.title">{{ profile.name }} | {{profile.chinese_name}}</p>
        <div class="footer-links">
            Follow Me:
            <a class="footer-link" href="{{ profile.github }}">
                <i 
                class="fa-brands fa-github"
                ></i> Github
            </a>
        </div>
        <p class="footer-note" data-i18n="footer.note">
            Copyright 2026
        </p>
    </div>
</footer>
